name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ensure bundled binaries are executable
        run: chmod +x third_party/bin/* || true

      - name: Run unit tests
        run: pytest -q

      - name: Run real bundled-tool checks
        env:
          RNA_KIT_RUN_REAL_TOOLS: "1"
        run: pytest tests/test_real_tools.py -q
